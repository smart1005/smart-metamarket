<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — Smart MetaMarket</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Top Navigation -->
  <nav class="navbar">
    <div class="navbar-logo" onclick="window.location='index.html'" style="cursor:pointer;">
      Smart<span>Meta</span>Market
    </div>
    <div class="navbar-actions">
      <a href="dashboard.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.85rem;">Vendor</a>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-content">

    <!-- Toggle: Products / Services -->
    <section class="section" style="padding-bottom: 0;">
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn w-full" id="btn-products" onclick="switchTab('products')">
          🛍️ Products
        </button>
        <button class="btn w-full" id="btn-services" onclick="switchTab('services')">
          🔧 Services
        </button>
      </div>

      <!-- Search Bar -->
      <div class="search-box" style="margin-bottom: 20px;">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="browse-search" 
          placeholder="Search..." 
          oninput="handleSearch()"
        />
        <button class="search-btn" onclick="handleSearch()">Go</button>
      </div>
    </section>

    <!-- Products Tab -->
    <section class="section" id="products-tab" style="padding-top: 0;">
      <div class="section-header">
        <h2>All Products</h2>
        <span class="text-sub" id="product-count"></span>
      </div>
      <div id="products-grid" class="vendor-grid">
        <div class="spinner"></div>
      </div>
    </section>

    <!-- Services Tab -->
    <section class="section" id="services-tab" style="padding-top: 0; display: none;">

      <!-- Category Filter -->
      <div id="category-filter" style="overflow-x: auto; white-space: nowrap; margin-bottom: 16px; padding-bottom: 8px;">
        <!-- loaded by JS -->
      </div>

      <div class="section-header">
        <h2>All Services</h2>
        <span class="text-sub" id="service-count"></span>
      </div>
      <div id="services-grid" class="vendor-grid">
        <div class="spinner"></div>
      </div>
    </section>

  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-item" onclick="window.location='index.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Home
    </div>
    <div class="bottom-nav-item active" onclick="switchTab('products')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z"/>
      </svg>
      Products
    </div>
    <div class="bottom-nav-item" onclick="switchTab('services')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      Services
    </div>
    <div class="bottom-nav-item" onclick="window.location='dashboard.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      Vendor
    </div>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/browse.js"></script>

</body>
</html>
