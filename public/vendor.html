<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor — Smart MetaMarket</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .vendor-hero {
      position: relative;
      height: 200px;
      background: var(--card);
      overflow: hidden;
    }

    .vendor-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    .vendor-avatar {
      position: absolute;
      bottom: -40px;
      left: 20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      object-fit: cover;
      background: var(--card);
    }

    .vendor-info {
      padding: 50px 20px 20px;
    }

    .vendor-info h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .vendor-info p {
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .contact-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .contact-buttons a {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .whatsapp-btn {
      background: #25D366;
      color: white;
    }

    .call-btn {
      background: var(--primary);
      color: white;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--subtext);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .product-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .product-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .product-item-body {
      padding: 10px;
    }

    .product-item-body h4 {
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .product-item-body .price {
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .collection-section {
      margin-bottom: 24px;
    }

    .collection-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--primary);
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .portfolio-grid img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .service-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .service-item h4 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .service-item p {
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .skill-tag {
      background: var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
    }

    .badge-active {
      background: var(--success);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="navbar">
    <div style="cursor:pointer;" onclick="history.back()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </div>
    <div class="navbar-logo">Smart<span>Meta</span>Market</div>
    <div style="width: 24px;"></div>
  </nav>

  <!-- Page Content -->
  <div class="page-content" id="vendor-page">

  </div>

  <!-- Bottom Navigation -->

      </svg>
      Home
    </div>
    <div class="bottom-nav-item" onclick="window.location='browse.html?type=products'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z"/>
      </svg>
      Products
    </div>
    <div class="bottom-nav-item" onclick="window.location='browse.html?type=services'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>

    <div class="bottom-nav-item" onclick="window.location='dashboard.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

      </svg>
      Vendor

  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/vendor.js"></script>

</body>
</html>
